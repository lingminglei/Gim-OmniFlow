spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:113.44.141.222:8848}
        namespace: ${NACOS_NAMESPACE:6af1a3f3-fc81-42e9-976c-6520a1bc7775}
        service: gim-app-service
        register-enabled: true
    # 1. 定义函数入口名单，必须包含所有需要 MQ 通信的 Bean 名称。
    function:
      definition: imageGenerationTask;aiCreativeTaskQuery;soraCreativeTask;soraTaskQueryConsumer;payCancelConsumer;rechargeCreditConsumer;myNormalTask

    stream:
      # 2. 抽取全局默认配置，切换中间件时只需修改 binder 和对应中间件配置。
      default:
        binder: rocketmq
        content-type: application/json

      # 3. 逻辑绑定，声明 Topic 和 Group，格式为：方法名-in-0。
      bindings:
        # --- 创作提交链路 ---
        imageGenerationTask-in-0: # 文生图提交
          destination: topic-ai-image-submit
          group: group-image-processor
        soraCreativeTask-in-0: # Sora 视频提交
          destination: topic-ai-sora-submit
          group: group-sora-processor

        # --- 结果查询链路 ---
        aiCreativeTaskQuery-in-0: # 文生图查询
          destination: topic-ai-image-query
          group: group-image-query-processor
        soraTaskQueryConsumer-in-0: # Sora 视频查询
          destination: topic-ai-sora-query
          group: group-sora-query-processor
        payCancelConsumer-in-0: # 支付取消回滚
          destination: topic-pay-cancel
          group: group-pay-cancel-processor
        rechargeCreditConsumer-in-0: # 充值积分到账
          destination: topic-pay-recharge-credit
          group: group-pay-recharge-credit-processor
        payCancelProducer-out-0:
          destination: topic-pay-cancel
        rechargeCreditProducer-out-0:
          destination: topic-pay-recharge-credit
      # 4. RocketMQ 特有底层配置
      rocketmq:
        # 设置连接集群的物理信息。
        binder:
          name-server: 43.140.198.96:9876 # 替换为你的 RocketMQ NameServer 地址，多个节点用分号隔开。
          # producer 相关的全局通用配置
          producer:
            retry-times-when-send-failed: 3
        # 设置特定业务流的特殊属性。
        bindings:
          # 事务消息必须显式开启 Trans 类型并关联监听器 Bean 名称。
          myTransTask-out-0:
            producer:
              producerType: Trans
              transactionListener: myTransactionListenerBean
          # 非事务消息无需在此处配置，直接继承 default 设置即可。
  websocket:
    max-text-message-size: 1048576
    max-binary-message-size: 1048576
  config:
    import: classpath:ai-models-config.yml
