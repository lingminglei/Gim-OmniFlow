############## Sa-Token 配置 ##############
sa-token:
  # token 名称，同时也是 cookie 名称
  token-name: satoken
  # token 有效期，单位秒，默认 30 天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率，单位秒；超过该时间未访问系统会被冻结，默认 -1 表示不限制
  active-timeout: -1
  # 是否允许同一账号多地同时登录；true 允许一起登录，false 新登录会挤掉旧登录
  is-concurrent: true
  # 多人登录同一账号时，是否共用同一个 token；true 共用，false 每次登录新建 token
  is-share: false
  # token 风格，可取值：uuid、simple-uuid、random-32、random-64、random-128、tik
  token-style: uuid
  # 是否输出操作日志
  is-log: true

